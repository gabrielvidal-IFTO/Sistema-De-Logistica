<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiX - Rotas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/estilo.css" rel="stylesheet">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
            <div class="d-flex align-items-center mb-4 px-2">
                <i class="bi bi-cpu-fill text-info fs-3 me-2"></i>
                <span class="fs-4 fw-bold text-white">LogiX Engine</span>
            </div>
            <hr class="text-secondary">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active bg-secondary text-white" href="#">
                        <i class="bi bi-sliders me-2"></i> Roteirizador
                    </a>
                </li>
            </ul>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            
            <div class="pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2 fw-bold text-secondary mb-1">Rotas de Viagem</h1>
                <p class="text-muted small">Selecione o critério desejado para sua viagem.</p>
            </div>

            <div class="bg-white p-4 rounded-3 shadow-sm mb-4">
                <h5 class="fw-bold text-dark mb-3"><i class="bi bi-gear-wide-connected me-2 text-primary"></i>Critério de Otimização</h5>
                
                <div class="row g-3">
                    <div class="col-md-4">
                        <input type="radio" class="btn-check" name="criterioOtimizacao" id="critTempo" checked onclick="alterarCriterio('tempo')">
                        <label class="btn w-100 p-0 text-start" for="critTempo">
                            <div class="crit-card">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-clock-history me-3"></i>
                                    <div>
                                        <div class="fw-bold text-dark">Menor Tempo</div>
                                        <small class="text-muted">Prioriza rodovias rápidas, evita perímetros urbanos.</small>
                                    </div>
                                </div>
                            </div>
                        </label>
                    </div>

                    <div class="col-md-4">
                        <input type="radio" class="btn-check" name="criterioOtimizacao" id="critDistancia" onclick="alterarCriterio('distancia')">
                        <label class="btn w-100 p-0 text-start" for="critDistancia">
                            <div class="crit-card">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-signpost-split me-3"></i>
                                    <div>
                                        <div class="fw-bold text-dark">Menor Distância (Km)</div>
                                        <small class="text-muted">Foco na redução de rodagem absoluta e combustível.</small>
                                    </div>
                                </div>
                            </div>
                        </label>
                    </div>

                    <div class="col-md-4">
                        <input type="radio" class="btn-check" name="criterioOtimizacao" id="critDegradacao" onclick="alterarCriterio('degradacao')">
                        <label class="btn w-100 p-0 text-start" for="critDegradacao">
                            <div class="crit-card">
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-exclamation-triangle me-3"></i>
                                    <div>
                                        <div class="fw-bold text-dark">Conservação da Pista</div>
                                        <small class="text-muted">Evita estradas esburacadas/terra para poupar a frota.</small>
                                    </div>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="route-container">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold text-secondary mb-0">Rotas Calculadas pelo Critério</h5>
                    <span id="labelCriterio" class="badge bg-primary text-uppercase px-3 py-2">Critério: Tempo</span>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Rota</th>
                                <th>Itinerário</th>
                                <th>Distância</th>
                                <th>Tempo Estimado</th>
                                <th>Condição da Via</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaCorpo">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const dadosRotas = {
        tempo: [
            { id: "ROT-SP01", de: "São Paulo (CD)", para: "Campinas", km: "105 km", tempo: "1h 10min", via: "Excelente (Pedagiada)" },
            { id: "ROT-RJ02", de: "Rio de Janeiro", para: "Petrópolis", km: "72 km", tempo: "1h 05min", via: "Boa" }
        ],
        distancia: [
            { id: "ROT-SP01", de: "São Paulo (CD)", para: "Campinas", km: "88 km (Rotas Secundárias)", tempo: "1h 45min", via: "Regular / Trânsito Urbano" },
            { id: "ROT-RJ02", de: "Rio de Janeiro", para: "Petrópolis", km: "64 km (Serra Velha)", tempo: "1h 30min", via: "Ruim / Curvas Acentuadas" }
        ],
        degradacao: [
            { id: "ROT-SP01", de: "São Paulo (CD)", para: "Campinas", km: "115 km (Desvio de Buracos)", tempo: "1h 25min", via: "Tapete Asfáltico (Malha Nova)" },
            { id: "ROT-RJ02", de: "Rio de Janeiro", para: "Petrópolis", km: "78 km (Via Principal Rodoviária)", tempo: "1h 12min", via: "Ótima Conservação" }
        ]
    };

    function alterarCriterio(criterio) {
        const label = document.getElementById('labelCriterio');
        label.innerText = `Critério: ${criterio}`;
        
        const corpo = document.getElementById('tabelaCorpo');
        corpo.innerHTML = "";

        dadosRotas[criterio].forEach(rota => {
            const linha = `
                <tr>
                    <td><span class="badge bg-dark">${rota.id}</span></td>
                    <td>
                        <div class="route-path">
                            <span class="fw-bold text-dark">${rota.de}</span>
                            <i class="bi bi-arrow-right text-muted"></i>
                            <span class="text-secondary">${rota.para}</span>
                        </div>
                    </td>
                    <td class="fw-semibold">${rota.km}</td>
                    <td class="text-primary fw-bold">${rota.tempo}</td>
                    <td><span class="small fw-semibold text-secondary">${rota.via}</span></td>
                </tr>
            `;
            corpo.innerHTML += linha;
        });
    }

    // Inicializa a tabela
    window.onload = function() {
        alterarCriterio('tempo');
    };
</script>
</body>
</html>
